<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Halı Saha Puan Durumu</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; max-width: 600px; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #28a745; color: white; }
    </style>
</head>
<body>

    <h2>Güncel Puan Durumu</h2>
    
    <table>
        <thead>
            <tr>
                <th>Takım</th>
                <th>O</th>
                <th>G</th>
                <th>B</th>
                <th>M</th>
                <th>Puan</th>
            </tr>
        </thead>
        <tbody id="puan-tablosu">
            <tr><td colspan="6">Veriler yükleniyor...</td></tr>
        </tbody>
    </table>

    <script>
        // Senin E-Tablo linkin (Tırnak işaretleri içinde)
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtF4F7HaQQo0PiPsWvOE-IWnjJ2pQW52w37VcpKV_46N3texYA5_H1K0fKDvXActE29YmDbSdzkHhQ/pub?output=csv';

        fetch(csvUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Ağ yanıtı düzgün değil');
                }
                return response.text();
            })
            .then(data => {
                const satirlar = data.split('\n');
                const tabloGovdesi = document.getElementById('puan-tablosu');
                let htmlIcerigi = '';

                // E-Tablodaki ilk satırı (başlıkları) atlamak için i=1'den başlıyoruz
                for (let i = 1; i < satirlar.length; i++) {
                    if (satirlar[i].trim() === '') continue; 
                    
                    const sutunlar = satirlar[i].split(','); 
                    
                    htmlIcerigi += '<tr>';
                    sutunlar.forEach(sutun => {
                        htmlIcerigi += `<td>${sutun.trim()}</td>`;
                    });
                    htmlIcerigi += '</tr>';
                }
                
                tabloGovdesi.innerHTML = htmlIcerigi;
            })
            .catch(error => {
                console.error('Veri çekilirken hata oluştu:', error);
                document.getElementById('puan-tablosu').innerHTML = '<tr><td colspan="6" style="color:red;">Veri yüklenemedi. E-Tablonun yayınlandığından veya siteyi Netlify üzerinden açtığından emin ol.</td></tr>';
            });
    </script>

</body>
</html>
